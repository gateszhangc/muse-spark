apiVersion: apps/v1
kind: Deployment
metadata:
  name: muse-spark
  labels:
    app.kubernetes.io/name: muse-spark
    app.kubernetes.io/part-of: muse-spark
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: muse-spark
      app.kubernetes.io/part-of: muse-spark
  template:
    metadata:
      labels:
        app.kubernetes.io/name: muse-spark
        app.kubernetes.io/part-of: muse-spark
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      imagePullSecrets:
        - name: dokploy-fleet-ghcr
      containers:
        - name: web
          image: registry.144.91.77.245.sslip.io/muse-spark:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: HOSTNAME
              value: 0.0.0.0
            - name: PORT
              value: "3000"
            - name: NEXT_PUBLIC_SITE_URL
              value: https://muse-spark.lol
            - name: NEXT_PUBLIC_CLARITY_PROJECT_ID
              value: w914vw15aa
            - name: NEXT_PUBLIC_GA_MEASUREMENT_ID
              valueFrom:
                secretKeyRef:
                  name: muse-spark-public-env
                  key: NEXT_PUBLIC_GA_MEASUREMENT_ID
                  optional: true
            - name: NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION
              valueFrom:
                secretKeyRef:
                  name: muse-spark-public-env
                  key: NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION
                  optional: true
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi
