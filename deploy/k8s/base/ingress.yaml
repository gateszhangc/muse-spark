apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: muse-spark
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - secretName: muse-spark-live-tls
      hosts:
        - muse-spark.lol
        - www.muse-spark.lol
  rules:
    - host: muse-spark.lol
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: muse-spark
                port:
                  number: 80
    - host: www.muse-spark.lol
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: muse-spark
                port:
                  number: 80
