name: Build And Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: muse-spark-release
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.flags.outputs.should_release }}
      registry_ready: ${{ steps.flags.outputs.registry_ready }}
    steps:
      - name: Derive release flags
        id: flags
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || ! printf '%s' "$HEAD_COMMIT_MESSAGE" | grep -Fq '[skip ci]'; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$REGISTRY_USERNAME" ] && [ -n "$REGISTRY_PASSWORD" ]; then
            echo "registry_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "registry_ready=false" >> "$GITHUB_OUTPUT"
          fi

  release-skipped:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true' && needs.prepare.outputs.registry_ready != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Explain skipped release
        run: |
          echo "Release jobs skipped because REGISTRY_USERNAME / REGISTRY_PASSWORD are not configured."

  build-and-push:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true' && needs.prepare.outputs.registry_ready == 'true'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Derive image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: registry.144.91.77.245.sslip.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: registry.144.91.77.245.sslip.io/muse-spark:${{ steps.meta.outputs.image_tag }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=https://muse-spark.lol
            NEXT_PUBLIC_CLARITY_PROJECT_ID=w914vw15aa
            NEXT_PUBLIC_GA_MEASUREMENT_ID=${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
            NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION=${{ secrets.NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION }}

  update-gitops-tag:
    needs:
      - prepare
      - build-and-push
    if: needs.prepare.outputs.should_release == 'true' && needs.prepare.outputs.registry_ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Kustomize image tag
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          path = Path("deploy/k8s/overlays/prod/kustomization.yaml")
          content = path.read_text()
          updated = re.sub(r"(newTag:\s*)([^\n]+)", rf"\1{os.environ['IMAGE_TAG']}", content)
          path.write_text(updated)
          PY

      - name: Commit updated image tag
        run: |
          if git diff --quiet -- deploy/k8s/overlays/prod/kustomization.yaml; then
            echo "No GitOps changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/k8s/overlays/prod/kustomization.yaml
          git commit -m "chore: release ${IMAGE_TAG} [skip ci]"
          git push
